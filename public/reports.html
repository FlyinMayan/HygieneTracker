<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reports — HygieneTrack</title>
  <link rel="stylesheet" href="/style.css">
  <script>if (localStorage.getItem('theme') === 'dark') document.documentElement.setAttribute('data-theme','dark');</script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"></script>
</head>
<body>
  <div class="report-header">
    <div class="report-header-left">
      <a class="nav-link" href="/admin.html">← Dashboard</a>
      <h1>Reports</h1>
    </div>
    <div class="report-header-right">
      <div class="range-buttons">
        <button class="range-btn active" data-days="1">Today</button>
        <button class="range-btn" data-days="7">Last 7 Days</button>
        <button class="range-btn" data-days="30">Last 30 Days</button>
        <button class="range-btn" data-days="90">Last 90 Days</button>
      </div>
      <button class="theme-toggle" id="themeToggle" title="Toggle dark mode">🌙</button>
    </div>
  </div>

  <!-- Trend -->
  <div class="report-card">
    <div class="report-card-header">
      <h2 id="trendTitle">Scans Over Time</h2>
      <a class="export-btn" id="exportBtn" href="#">Export CSV</a>
    </div>
    <div class="chart-wrap chart-wrap-wide">
      <canvas id="trendChart"></canvas>
    </div>
  </div>

  <!-- Department + Heatmap -->
  <div class="report-two-col">
    <div class="report-card">
      <div class="report-card-header">
        <h2>By Department</h2>
      </div>
      <div class="chart-wrap">
        <canvas id="deptChart"></canvas>
      </div>
    </div>

    <div class="report-card">
      <div class="report-card-header">
        <h2>Activity by Day &amp; Hour</h2>
        <span class="report-badge">D3</span>
      </div>
      <div id="heatmapContainer"></div>
    </div>
  </div>

  <!-- Per-person table -->
  <div class="report-card">
    <div class="report-card-header">
      <h2>By Person</h2>
    </div>
    <table>
      <thead>
        <tr>
          <th>Rank</th>
          <th>Name</th>
          <th>Department</th>
          <th>Unit</th>
          <th>Scans</th>
        </tr>
      </thead>
      <tbody id="personTableBody">
        <tr><td colspan="5" class="empty-state">Loading…</td></tr>
      </tbody>
    </table>
  </div>

  <script src="/js/reports/trend.js" defer></script>
  <script src="/js/reports/department.js" defer></script>
  <script src="/js/reports/heatmap.js" defer></script>
  <script src="/js/reports/person.js" defer></script>
  <script src="/js/reports/index.js" defer></script>
</body>
</html>
