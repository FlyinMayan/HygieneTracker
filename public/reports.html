<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reports — HygieneTrack</title>
  <link rel="stylesheet" href="/style.css">
  <script>
    // Apply saved theme before paint to avoid flash
    if (localStorage.getItem('theme') === 'dark') document.documentElement.setAttribute('data-theme','dark');
  </script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"></script>
</head>
<body>
  <div class="report-header">
    <div class="report-header-left">
      <a class="nav-link" href="/admin.html">← Dashboard</a>
      <h1>Reports</h1>
    </div>
    <div class="report-header-right">
      <div class="range-buttons">
        <button class="range-btn active" data-days="1">Today</button>
        <button class="range-btn" data-days="7">Last 7 Days</button>
        <button class="range-btn" data-days="30">Last 30 Days</button>
        <button class="range-btn" data-days="90">Last 90 Days</button>
      </div>
      <button class="theme-toggle" id="themeToggle" title="Toggle dark mode">🌙</button>
    </div>
  </div>

  <!-- Trend -->
  <div class="report-card">
    <div class="report-card-header">
      <h2>Scans Over Time</h2>
      <a class="export-btn" id="exportBtn" href="#">Export CSV</a>
    </div>
    <div class="chart-wrap chart-wrap-wide">
      <canvas id="trendChart"></canvas>
    </div>
  </div>

  <!-- Department + Radial clock -->
  <div class="report-two-col">
    <div class="report-card">
      <div class="report-card-header">
        <h2>By Department</h2>
      </div>
      <div class="chart-wrap">
        <canvas id="deptChart"></canvas>
      </div>
    </div>

    <div class="report-card">
      <div class="report-card-header">
        <h2>Activity by Hour</h2>
        <span class="report-badge">D3</span>
      </div>
      <div id="heatmapContainer"></div>
    </div>
  </div>

  <!-- Per-person table -->
  <div class="report-card">
    <div class="report-card-header">
      <h2>By Person</h2>
    </div>
    <table>
      <thead>
        <tr>
          <th>Rank</th>
          <th>Name</th>
          <th>Department</th>
          <th>Unit</th>
          <th>Scans</th>
        </tr>
      </thead>
      <tbody id="personTableBody">
        <tr><td colspan="5" class="empty-state">Loading…</td></tr>
      </tbody>
    </table>
  </div>

  <script>
    let activeDays = 1;
    let trendChart, deptChart;

    // ── Dark mode ────────────────────────────────────────────────────────────
    const themeToggle = document.getElementById('themeToggle');
    function applyTheme() {
      const dark = document.documentElement.getAttribute('data-theme') === 'dark';
      themeToggle.textContent = dark ? '☀️' : '🌙';
    }
    themeToggle.addEventListener('click', () => {
      const dark = document.documentElement.getAttribute('data-theme') === 'dark';
      document.documentElement.setAttribute('data-theme', dark ? 'light' : 'dark');
      localStorage.setItem('theme', dark ? 'light' : 'dark');
      applyTheme();
    });
    applyTheme();

    // ── Date range buttons ───────────────────────────────────────────────────
    document.querySelectorAll('.range-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeDays = parseInt(btn.dataset.days);
        loadAll();
      });
    });

    document.getElementById('exportBtn').addEventListener('click', e => {
      e.preventDefault();
      window.location.href = `/api/reports/export?days=${activeDays}`;
    });

    // ── Helpers ──────────────────────────────────────────────────────────────
    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function hourLabel(h) {
      if (h === 0)  return '12am';
      if (h < 12)   return `${h}am`;
      if (h === 12) return '12pm';
      return `${h - 12}pm`;
    }

    function fillDates(rows, days) {
      const map = {};
      rows.forEach(r => { map[r.date.slice(0, 10)] = r.count; });
      const result = [];
      for (let i = days - 1; i >= 0; i--) {
        const d = new Date();
        d.setDate(d.getDate() - i);
        const key = d.toISOString().slice(0, 10);
        result.push({ date: key, count: map[key] || 0 });
      }
      return result;
    }

    // ── Trend chart (Chart.js) ───────────────────────────────────────────────
    async function loadTrend() {
      const res  = await fetch(`/api/reports/trend?days=${activeDays}`);
      const raw  = await res.json();
      const data = fillDates(raw, activeDays);

      const labels = data.map(d => {
        const dt = new Date(d.date + 'T12:00:00');
        return activeDays === 1
          ? 'Today'
          : dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      });

      if (trendChart) trendChart.destroy();
      trendChart = new Chart(document.getElementById('trendChart'), {
        type: 'line',
        data: {
          labels,
          datasets: [{
            label: 'Scans',
            data: data.map(d => d.count),
            borderColor: '#059669',
            backgroundColor: 'rgba(5,150,105,0.08)',
            borderWidth: 2,
            pointRadius: activeDays <= 7 ? 4 : 2,
            pointBackgroundColor: '#059669',
            fill: true,
            tension: 0.3,
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            y: { beginAtZero: true, ticks: { stepSize: 1 }, grid: { color: '#f1f5f9' } },
            x: { grid: { display: false }, ticks: { maxTicksLimit: 14 } }
          }
        }
      });
    }

    // ── Department chart (Chart.js) ──────────────────────────────────────────
    async function loadDept() {
      const res  = await fetch(`/api/reports/by-department?days=${activeDays}`);
      const data = await res.json();
      const palette = ['#059669','#0d9488','#0284c7','#7c3aed','#db2777','#d97706'];

      if (deptChart) deptChart.destroy();
      deptChart = new Chart(document.getElementById('deptChart'), {
        type: 'bar',
        data: {
          labels: data.map(d => d.department),
          datasets: [{
            label: 'Scans',
            data: data.map(d => d.count),
            backgroundColor: data.map((_, i) => palette[i % palette.length]),
            borderRadius: 6,
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          indexAxis: 'y',
          plugins: { legend: { display: false } },
          scales: {
            x: { beginAtZero: true, grid: { color: '#f1f5f9' } },
            y: { grid: { display: false } }
          }
        }
      });
    }

    // ── Radial clock (D3) ────────────────────────────────────────────────────
    async function loadRadialClock() {
      const res  = await fetch(`/api/reports/heatmap?days=${activeDays}`);
      const data = await res.json();

      // Aggregate counts by hour across all days
      const hourTotals = Array.from({ length: 24 }, (_, h) => ({
        hour: h,
        count: data.filter(d => d.hour === h).reduce((s, d) => s + d.count, 0)
      }));

      const container = document.getElementById('heatmapContainer');
      container.innerHTML = '';

      const size     = Math.min(container.clientWidth - 32, 300);
      const cx       = size / 2;
      const cy       = size / 2;
      const innerR   = size * 0.15;
      const outerR   = size * 0.43;
      const maxCount = Math.max(...hourTotals.map(d => d.count), 1);
      const total    = hourTotals.reduce((s, d) => s + d.count, 0);
      const arcGen   = d3.arc();
      const sliceAngle = (Math.PI * 2) / 24;

      const svg = d3.select('#heatmapContainer')
        .append('svg')
        .attr('width', size + 32)
        .attr('height', size + 36)
        .style('display', 'block')
        .style('margin', '0 auto');

      const g = svg.append('g')
        .attr('transform', `translate(${cx + 16},${cy + 12})`);

      // Grid rings
      [0.33, 0.67, 1.0].forEach(r => {
        g.append('circle')
          .attr('r', innerR + (outerR - innerR) * r)
          .attr('fill', 'none')
          .attr('stroke', '#e5e7eb')
          .attr('stroke-width', 0.5)
          .attr('stroke-dasharray', '2,3');
      });

      // Hour slices
      hourTotals.forEach(({ hour, count }) => {
        const startAngle = (hour / 24) * Math.PI * 2 - Math.PI / 2;
        const endAngle   = startAngle + sliceAngle;
        const barLen     = (count / maxCount) * (outerR - innerR);
        const shiftColor = (hour >= 22 || hour < 6) ? '#3b82f6'
                         : hour < 14                 ? '#059669'
                                                     : '#f59e0b';

        // Empty placeholder
        g.append('path')
          .attr('d', arcGen({ innerRadius: innerR, outerRadius: innerR + 4, startAngle, endAngle }))
          .attr('fill', '#e5e7eb');

        if (count > 0) {
          g.append('path')
            .attr('d', arcGen({ innerRadius: innerR, outerRadius: innerR + barLen, startAngle, endAngle }))
            .attr('fill', shiftColor)
            .attr('opacity', 0.85)
            .append('title')
            .text(`${hourLabel(hour)}: ${count} scan${count !== 1 ? 's' : ''}`);
        }
      });

      // Inner circle
      g.append('circle').attr('r', innerR - 1).attr('fill', '#f8fafc').attr('stroke', '#e5e7eb');

      // Center label
      g.append('text').attr('text-anchor', 'middle').attr('y', -5)
        .attr('font-size', '13px').attr('font-weight', '700').attr('fill', '#111827')
        .text(total.toLocaleString());
      g.append('text').attr('text-anchor', 'middle').attr('y', 9)
        .attr('font-size', '9px').attr('fill', '#6b7280').text('scans');

      // Cardinal hour labels
      [0, 6, 12, 18].forEach(h => {
        const angle  = (h / 24) * Math.PI * 2 - Math.PI / 2;
        const labelR = outerR + 14;
        g.append('text')
          .attr('x', Math.cos(angle) * labelR)
          .attr('y', Math.sin(angle) * labelR + 4)
          .attr('text-anchor', 'middle')
          .attr('font-size', '10px')
          .attr('fill', '#6b7280')
          .text(hourLabel(h));
      });

      // Shift legend
      const legend = svg.append('g')
        .attr('transform', `translate(${cx + 16 - 100}, ${size + 20})`);
      [
        { color: '#059669', label: 'Day (6a–2p)' },
        { color: '#f59e0b', label: 'Evening (2p–10p)' },
        { color: '#3b82f6', label: 'Night (10p–6a)' },
      ].forEach(({ color, label }, i) => {
        legend.append('rect').attr('x', i * 72).attr('width', 8).attr('height', 8).attr('rx', 2).attr('fill', color);
        legend.append('text').attr('x', i * 72 + 12).attr('y', 8).attr('font-size', '10px').attr('fill', '#6b7280').text(label);
      });
    }

    // ── Per-person table ─────────────────────────────────────────────────────
    async function loadPersonTable() {
      const res  = await fetch(`/api/reports/by-person?days=${activeDays}`);
      const data = await res.json();
      const tbody = document.getElementById('personTableBody');
      if (!data.length) {
        tbody.innerHTML = '<tr><td colspan="5" class="empty-state">No data for this period.</td></tr>';
        return;
      }
      const max = data[0].count;
      tbody.innerHTML = data.map((p, i) => `
        <tr>
          <td class="rank-cell">${i + 1}</td>
          <td>${escapeHtml(p.user_name)}</td>
          <td>${escapeHtml(p.department)}</td>
          <td>${escapeHtml(p.unit)}</td>
          <td>
            <div class="bar-cell">
              <div class="bar-track">
                <div class="bar-fill" style="width:${Math.round((p.count / max) * 100)}%"></div>
              </div>
              <span class="bar-label">${p.count}</span>
            </div>
          </td>
        </tr>
      `).join('');
    }

    async function loadAll() {
      await Promise.all([loadTrend(), loadDept(), loadRadialClock(), loadPersonTable()]);
    }

    loadAll();
  </script>
</body>
</html>
