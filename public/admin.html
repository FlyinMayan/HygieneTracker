<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard — HygieneTrack</title>
  <link rel="stylesheet" href="/style.css">
  <script>if (localStorage.getItem('theme') === 'dark') document.documentElement.setAttribute('data-theme','dark');</script>
</head>
<body>
  <div class="page-loader" id="pageLoader"></div>
  <script src="/js/loader.js"></script>
  <div class="admin-header">
    <span class="admin-brand">🏥 HygieneTrack</span>
    <nav class="admin-nav">
      <a href="/admin.html" class="admin-nav-link admin-nav-link--active">Dashboard</a>
      <a href="/reports.html" class="admin-nav-link">Reports</a>
      <a href="/settings.html" class="admin-nav-link">⚙ Settings</a>
      <button class="theme-toggle" id="themeToggle" title="Toggle dark mode">🌙</button>
    </nav>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-value" id="todayCount">—</div>
      <div class="stat-label">Scans Today</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="totalCount">—</div>
      <div class="stat-label">Total Scans</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="complianceValue">—</div>
      <div class="stat-label">30-Day Compliance</div>
    </div>
  </div>

  <div class="table-card">
    <div class="table-toolbar">
      <input type="text" id="filterInput" placeholder="Filter by name, department, unit, or location…">
      <span class="result-count" id="resultCount"></span>
    </div>
    <table>
      <thead>
        <tr>
          <th class="sortable" data-col="user_name">Name <span class="sort-icon"></span></th>
          <th class="sortable" data-col="department">Department <span class="sort-icon"></span></th>
          <th class="sortable" data-col="unit">Unit <span class="sort-icon"></span></th>
          <th class="sortable" data-col="location">Location <span class="sort-icon"></span></th>
          <th class="sortable" data-col="scanned_at">Date &amp; Time <span class="sort-icon"></span></th>
        </tr>
      </thead>
      <tbody id="scanTableBody">
        <tr><td colspan="5" class="empty-state">Loading…</td></tr>
      </tbody>
    </table>
    <div class="pagination" id="pagination"></div>
  </div>

  <script src="/js/admin.js" defer></script>
</body>
</html>
