<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard — HygieneTrack</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="admin-header">
    <h1>🏥 HygieneTrack Dashboard</h1>
    <div class="actions">
      <a href="/reports.html">Reports</a>
      <a href="/qr-generator">+ Generate QR</a>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-value" id="todayCount">—</div>
      <div class="stat-label">Scans Today</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="totalCount">—</div>
      <div class="stat-label">Total Scans</div>
    </div>
  </div>

  <div class="table-card">
    <div class="table-toolbar">
      <input type="text" id="filterInput" placeholder="Filter by name, department, unit, or location…" oninput="onFilter()">
      <span class="result-count" id="resultCount"></span>
    </div>
    <table>
      <thead>
        <tr>
          <th class="sortable" data-col="user_name">Name <span class="sort-icon"></span></th>
          <th class="sortable" data-col="department">Department <span class="sort-icon"></span></th>
          <th class="sortable" data-col="unit">Unit <span class="sort-icon"></span></th>
          <th class="sortable" data-col="location">Location <span class="sort-icon"></span></th>
          <th class="sortable" data-col="scanned_at">Date &amp; Time <span class="sort-icon"></span></th>
        </tr>
      </thead>
      <tbody id="scanTableBody">
        <tr><td colspan="5" class="empty-state">Loading…</td></tr>
      </tbody>
    </table>
    <div class="pagination" id="pagination"></div>
  </div>

  <script>
    let allScans = [];
    let sortCol = 'scanned_at';
    let sortDir = 'desc';
    let currentPage = 1;
    const PAGE_SIZE = 25;

    function formatDate(isoStr) {
      return new Date(isoStr).toLocaleString('en-US', { dateStyle: 'medium', timeStyle: 'short' });
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function getFiltered() {
      const q = document.getElementById('filterInput').value.toLowerCase().trim();
      if (!q) return allScans;
      return allScans.filter(s =>
        s.user_name.toLowerCase().includes(q) ||
        s.location.toLowerCase().includes(q) ||
        (s.department || '').toLowerCase().includes(q) ||
        (s.unit || '').toLowerCase().includes(q)
      );
    }

    function getSorted(scans) {
      return [...scans].sort((a, b) => {
        let av = a[sortCol] ?? '';
        let bv = b[sortCol] ?? '';
        if (sortCol === 'scanned_at') {
          av = new Date(av).getTime();
          bv = new Date(bv).getTime();
        } else {
          av = av.toLowerCase();
          bv = bv.toLowerCase();
        }
        if (av < bv) return sortDir === 'asc' ? -1 : 1;
        if (av > bv) return sortDir === 'asc' ? 1 : -1;
        return 0;
      });
    }

    function render() {
      const filtered = getFiltered();
      const sorted = getSorted(filtered);
      const total = sorted.length;
      const totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
      if (currentPage > totalPages) currentPage = totalPages;

      const start = (currentPage - 1) * PAGE_SIZE;
      const page = sorted.slice(start, start + PAGE_SIZE);

      // Result count
      document.getElementById('resultCount').textContent =
        total === allScans.length
          ? `${total.toLocaleString()} records`
          : `${total.toLocaleString()} of ${allScans.length.toLocaleString()}`;

      // Table body
      const tbody = document.getElementById('scanTableBody');
      if (!page.length) {
        tbody.innerHTML = '<tr><td colspan="5" class="empty-state">No scans found.</td></tr>';
      } else {
        tbody.innerHTML = page.map(s => `
          <tr>
            <td>${escapeHtml(s.user_name)}</td>
            <td>${escapeHtml(s.department || '—')}</td>
            <td>${escapeHtml(s.unit || '—')}</td>
            <td>${escapeHtml(s.location)}</td>
            <td>${formatDate(s.scanned_at)}</td>
          </tr>
        `).join('');
      }

      // Sort indicators
      document.querySelectorAll('thead th[data-col]').forEach(th => {
        const icon = th.querySelector('.sort-icon');
        th.classList.remove('sort-asc', 'sort-desc');
        icon.textContent = '';
        if (th.dataset.col === sortCol) {
          th.classList.add(sortDir === 'asc' ? 'sort-asc' : 'sort-desc');
          icon.textContent = sortDir === 'asc' ? ' ▲' : ' ▼';
        }
      });

      // Pagination
      const pag = document.getElementById('pagination');
      if (totalPages <= 1) {
        pag.innerHTML = '';
        return;
      }
      pag.innerHTML = `
        <button onclick="goPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>← Prev</button>
        <span class="page-info">Page ${currentPage} of ${totalPages}</span>
        <button onclick="goPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>Next →</button>
      `;
    }

    function goPage(n) {
      currentPage = n;
      render();
    }

    function onFilter() {
      currentPage = 1;
      render();
    }

    function onSort(col) {
      if (sortCol === col) {
        sortDir = sortDir === 'asc' ? 'desc' : 'asc';
      } else {
        sortCol = col;
        sortDir = col === 'scanned_at' ? 'desc' : 'asc';
      }
      currentPage = 1;
      render();
    }

    document.querySelectorAll('thead th[data-col]').forEach(th => {
      th.addEventListener('click', () => onSort(th.dataset.col));
    });

    async function loadData() {
      const [scansRes, statsRes] = await Promise.all([
        fetch('/api/scans'),
        fetch('/api/stats')
      ]);
      allScans = await scansRes.json();
      const stats = await statsRes.json();
      document.getElementById('todayCount').textContent = stats.today.toLocaleString();
      document.getElementById('totalCount').textContent = stats.total.toLocaleString();
      render();
    }

    loadData();
    setInterval(loadData, 30000);
  </script>
</body>
</html>
