<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard — HygieneTrack</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="admin-header">
    <h1>🏥 HygieneTrack Dashboard</h1>
    <div class="actions">
      <a href="/qr-generator">+ Generate QR</a>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-value" id="todayCount">—</div>
      <div class="stat-label">Scans Today</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="totalCount">—</div>
      <div class="stat-label">Total Scans</div>
    </div>
  </div>

  <div class="table-card">
    <div class="table-toolbar">
      <input type="text" id="filterInput" placeholder="Filter by name, department, unit, or location…" oninput="applyFilter()">
    </div>
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Name / Badge ID</th>
          <th>Department</th>
          <th>Unit</th>
          <th>Location</th>
          <th>Date &amp; Time</th>
        </tr>
      </thead>
      <tbody id="scanTableBody">
        <tr><td colspan="4" class="empty-state">Loading…</td></tr>
      </tbody>
    </table>
  </div>

  <script>
    let allScans = [];

    function formatDate(isoStr) {
      const d = new Date(isoStr + 'Z'); // SQLite stores UTC without Z
      return d.toLocaleString('en-US', { dateStyle: 'medium', timeStyle: 'short' });
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function renderTable(scans) {
      const tbody = document.getElementById('scanTableBody');
      if (!scans.length) {
        tbody.innerHTML = '<tr><td colspan="6" class="empty-state">No scans recorded yet.</td></tr>';
        return;
      }
      tbody.innerHTML = scans.map((s, i) => `
        <tr>
          <td>${s.id}</td>
          <td>${escapeHtml(s.user_name)}</td>
          <td>${escapeHtml(s.department || '—')}</td>
          <td>${escapeHtml(s.unit || '—')}</td>
          <td>${escapeHtml(s.location)}</td>
          <td>${formatDate(s.scanned_at)}</td>
        </tr>
      `).join('');
    }

    function applyFilter() {
      const q = document.getElementById('filterInput').value.toLowerCase();
      if (!q) return renderTable(allScans);
      const filtered = allScans.filter(s =>
        s.user_name.toLowerCase().includes(q) ||
        s.location.toLowerCase().includes(q) ||
        (s.department || '').toLowerCase().includes(q) ||
        (s.unit || '').toLowerCase().includes(q)
      );
      renderTable(filtered);
    }

    async function loadData() {
      const [scansRes, statsRes] = await Promise.all([
        fetch('/api/scans'),
        fetch('/api/stats')
      ]);
      allScans = await scansRes.json();
      const stats = await statsRes.json();

      document.getElementById('todayCount').textContent = stats.today;
      document.getElementById('totalCount').textContent = stats.total;
      renderTable(allScans);
    }

    loadData();
    // Refresh every 30 seconds
    setInterval(loadData, 30000);
  </script>
</body>
</html>
